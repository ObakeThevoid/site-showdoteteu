<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Show do Teteu</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color:darkblue;
            flex-direction: column;
        background-image: /* HTML: <div class="zig-zag-box"></div> */
.zig-zag-box {
  --s: 18px;  /* control the size of the spikes */
  --w: 350px; /* preferred image width */
  
  width: round(var(--w),4*var(--s)); 
  aspect-ratio: 1;
  object-fit: cover;
  padding: calc(2*var(--s));
  box-sizing: border-box;
  background: #0B486B;
  --_m:#0000 0 calc(2*atan(.5)),#000 0 50%;
  mask:
    repeating-conic-gradient(from atan(2) at 50% var(--s),var(--_m))
     calc(2*var(--s)) calc(-1*var(--s))/calc(4*var(--s)) 100% intersect,
    repeating-conic-gradient(from atan(-.5) at var(--s),var(--_m))
     calc(-1*var(--s)) calc(2*var(--s))/100% calc(4*var(--s));
};
        }
        #balao{color: black;
            background-color: aliceblue;
            border-radius: 15px;
            padding: 15px 25px;
            max-width: 250px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);;        
        
        
        
        }
       
        #show{
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #opcoes{
display: flex;
align-items: center;
gap: 10px;
padding: 10px;
border-radius: 8px;
cursor: pointer;
}
    
#sim{
        display: flex;
        background-color: lightgreen;
        padding: 10px 20px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        box-shadow: 2px 2px 5px rgba(0,0,0,0.3);;
    }
    #nao{
        display: flex;
        background-color: lightcoral;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor:pointer;
        box-shadow: 2px 2px 5px rgba(0,0,0,0.3);;
    }
    
    </style>
</head>

<body>
    <div id="show">  
            <img src="cachorro_de_terno.png">
           <div id="balao">
            <h1>
                Você tem certeza que pode entrar?
            
                </h1>
           </div>
       </div>
        
<div id="opcoes">
     <button id="sim">verdadeiro</button>
     <button id="nao"> Falso </button>  
</div>
 <script>
const perguntas = [
  "Você quer o Tesouro? entao responda as minhas perguntas",
  "Vermelho é minha cor preferida?",
  "Eu prefiro ficar em casa do que sair?",
  "Eu gosto mais de doce do que salgado?",
  "Eu demoro pra responder mensagem de propósito?",
  "Prefiro gato do que cachorro?",
  "Eu não ligo quando você demora pra responder?",
  "Eu gosto de artes (artísticas e marciais)?",
  "Eu gosto de músicas?",
  "Eu Amo a Bianca?",
];

const respostas = [
  true, true, true, false, false,
  false, false, true, true, true
];

const balao = document.getElementById("balao");
const sim = document.getElementById("sim");
const nao = document.getElementById("nao");

let index = 0;
let acertos = 0;  
let minimo = 3;

balao.querySelector("h1").textContent = perguntas[index];

sim.addEventListener("click", () => responder(true));
nao.addEventListener("click", () => responder(false));

function avancarPerguntas() {
  index++;

  if (index < perguntas.length) {
    balao.querySelector("h1").textContent = perguntas[index];
  } else {
    balao.querySelector("h1").textContent =
      "Você acertou " + acertos + " de " + perguntas.length + " Parabens! Pode passar";

    
    if (acertos >= minimo) {
      const premio = document.createElement("a");
      premio.href = "https://www.youtube.com/shorts/vRvdtGIk6-w";
      premio.textContent = "clique aqui";

      document.body.appendChild(premio);
    }
else {
 balao.querySelector("h1").textContent =
      "Você acertou " + acertos + " de " + perguntas.length + 
      "Não tem permissão para entrar!";

}  

}
} 

function responder(escolha) {
 
    const musica = document.getElementById("musica");
    if (musica) {
    musica.volume = 0.2;
    musica.play();
  }

    if (escolha === respostas[index]) {
    balao.querySelector("h1").textContent = "Acertou!";
    acertos++;
  } else {
    balao.querySelector("h1").textContent = "Errou!";
  }

  setTimeout(() => {
    avancarPerguntas();
  }, 1000);
}
    const musica = document.getElementById("musica");
musica.volume = 0.2;
 </script>

<audio id = "musica" src = "Why the rush.mp3" loop> </audio>

</body>
</html>
